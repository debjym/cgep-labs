name: GRC Evidence Pipeline

# Lab 4.3: this file IS the CM-3 (change control), CM-6 (config settings),
# CA-2 (control assessment), RA-5 (vulnerability scanning), and AU-9
# (evidence integrity) evidence -- every PR run produces a named,
# timestamped artifact that nobody can quietly edit after the fact.

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write      # required to mint the OIDC token for AWS
  contents: read
  pull-requests: write # required to comment on the PR

env:
  AWS_REGION: ca-central-1
  # Must match `role_name` in 04-03 lab/terraform/oidc + account 612063236841.
  ROLE_ARN: arn:aws:iam::612063236841:role/github-actions-grc-evidence
  WORKSPACE: terraform/primitives/compliant-s3
  POLICY_DIR: 03-04 lab/policies
  GATE_SCRIPT: 03-04 lab/scripts/policy-gate.sh

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC, no keys on disk)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform init
        working-directory: ${{ env.WORKSPACE }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ env.WORKSPACE }}
        run: |
          terraform plan -out=tfplan \
            -var="project_name=cgep" \
            -var="environment=ci-pr-${{ github.event.pull_request.number }}"

      - name: Install Conftest
        run: |
          CONFTEST_VERSION=0.56.0
          curl -sL "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" | tar xz
          sudo mv conftest /usr/local/bin/

      - name: Conftest policy gate (fails closed on any violation)
        id: conftest
        continue-on-error: true
        run: bash "${{ env.GATE_SCRIPT }}" --workspace "${{ env.WORKSPACE }}" --policy "${{ env.POLICY_DIR }}"

      - name: Install tfsec
        run: |
          TFSEC_VERSION=1.28.14
          curl -fsSL "https://github.com/aquasecurity/tfsec/releases/download/v${TFSEC_VERSION}/tfsec-linux-amd64" -o /usr/local/bin/tfsec
          chmod +x /usr/local/bin/tfsec

      - name: tfsec scan (fails closed on high/critical)
        id: tfsec
        continue-on-error: true
        run: tfsec "${{ env.WORKSPACE }}" --minimum-severity HIGH --format sarif --out tfsec.sarif

      # Evidence is captured on failure too -- a gate that only proves itself
      # when everything passes isn't proving anything.
      - name: Assemble evidence bundle
        if: always()
        run: |
          mkdir -p evidence-bundle
          cp "${{ env.WORKSPACE }}/plan.json" evidence-bundle/ 2>/dev/null || true
          cp evidence/lab-3-4/conftest-results.json evidence-bundle/ 2>/dev/null || true
          cp tfsec.sarif evidence-bundle/ 2>/dev/null || true

      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: evidence-bundle/
          if-no-files-found: warn

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const conftest = "${{ steps.conftest.outcome }}" === "success" ? "pass" : "FAIL";
            const tfsec = "${{ steps.tfsec.outcome }}" === "success" ? "pass" : "FAIL";
            const body = [
              "### GRC Evidence Pipeline",
              `- Conftest policy gate: **${conftest}**`,
              `- tfsec (high/critical): **${tfsec}**`,
              `- Evidence artifact: \`grc-evidence-${{ github.run_id }}\` (see this run's Summary page)`
            ].join("\n");
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail closed if any gate failed
        if: steps.conftest.outcome != 'success' || steps.tfsec.outcome != 'success'
        run: |
          echo "Policy gate or tfsec scan reported a failure above -- failing closed."
          exit 1
